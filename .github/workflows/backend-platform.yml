name: Backend Platform

on:
  pull_request:
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/backend-platform.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "infra/**"
      - ".github/workflows/backend-platform.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build
      - run: npm test
      - run: docker build -t creatorapp-backend:test .

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
      - run: kustomize build infra/k8s/base > /tmp/creatorapp-manifests.yaml
