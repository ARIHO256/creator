apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: creatorapp-global-gateway
spec:
  gatewayClassName: envoy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: api.example.com
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: creatorapp-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: creatorapp-api
spec:
  parentRefs:
    - name: creatorapp-global-gateway
  hostnames:
    - api.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: creatorapp-backend-api
          port: 80
