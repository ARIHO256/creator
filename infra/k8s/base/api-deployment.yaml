apiVersion: apps/v1
kind: Deployment
metadata:
  name: creatorapp-backend-api
spec:
  replicas: 6
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: creatorapp-backend
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creatorapp-backend
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/example/creatorapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4010
              name: http
          envFrom:
            - configMapRef:
                name: creatorapp-backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: database-write-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-refresh-secret
            - name: AUTH_REGISTER_QUEUE_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: auth-register-queue-secret
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
