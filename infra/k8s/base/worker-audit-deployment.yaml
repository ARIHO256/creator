apiVersion: apps/v1
kind: Deployment
metadata:
  name: creatorapp-backend-worker-audit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: creatorapp-backend
      app.kubernetes.io/component: worker-audit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creatorapp-backend
        app.kubernetes.io/component: worker-audit
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker-audit
          image: ghcr.io/example/creatorapp-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: creatorapp-backend-config
          env:
            - name: JOBS_WORKER_ENABLED
              value: "true"
            - name: JOBS_WORKER_ID
              value: "audit"
            - name: JOBS_WORKER_QUEUES
              value: "audit"
            - name: JOBS_WORKER_BATCH
              value: "200"
            - name: JOBS_WORKER_CONCURRENCY
              value: "1"
            - name: JOBS_WORKER_POLL_MS
              value: "1000"
            - name: JOBS_WORKER_BUSY_POLL_MS
              value: "0"
            - name: REALTIME_STREAM_SERVER_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: database-write-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-refresh-secret
            - name: AUTH_REGISTER_QUEUE_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: auth-register-queue-secret
          command: ["node", "dist/main.js"]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
