apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: creatorapp-backend-worker-audit
spec:
  scaleTargetRef:
    name: creatorapp-backend-worker-audit
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 200
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring:9090
        metricName: background_jobs_due_pending_audit
        threshold: "100"
        query: sum(background_jobs_due_pending{queue="audit"})
