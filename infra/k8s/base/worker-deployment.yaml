apiVersion: apps/v1
kind: Deployment
metadata:
  name: creatorapp-backend-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: creatorapp-backend
      app.kubernetes.io/component: worker-general
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creatorapp-backend
        app.kubernetes.io/component: worker-general
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/example/creatorapp-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: creatorapp-backend-config
          env:
            - name: JOBS_WORKER_ENABLED
              value: "true"
            - name: JOBS_WORKER_QUEUES
              value: "auth,approvals,cache,catalog,exports,finance,listings,media,regulatory,search,wholesale,workflow"
            - name: JOBS_WORKER_BATCH
              value: "50"
            - name: JOBS_WORKER_CONCURRENCY
              value: "20"
            - name: JOBS_WORKER_BUSY_POLL_MS
              value: "50"
            - name: REALTIME_STREAM_SERVER_ENABLED
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: database-write-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: jwt-refresh-secret
            - name: AUTH_REGISTER_QUEUE_SECRET
              valueFrom:
                secretKeyRef:
                  name: creatorapp-backend-secrets
                  key: auth-register-queue-secret
          command: ["node", "dist/main.js"]
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "6Gi"
